<style>
  html, body, #viewDiv {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    /* iOS safe area support */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ───────── Controls panel ───────── */
  #controls {
    position: absolute;
    top: 12px;
    left: 12px;
    background: white;
    padding: 14px;
    z-index: 99;
    font-size: 13px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    width: 340px;
    border-radius: 10px;
    max-height: calc(100vh - 24px);
    overflow-y: auto;
    transition: transform 0.3s ease;
  }

  #controls.collapsed {
    transform: translateY(-90%);
  }

  input[type="text"], select {
    box-sizing: border-box;
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px; /* iOS zoom fix */
  }

  .section {
    font-weight: bold;
    margin-top: 10px;
  }

  #results {
    max-height: 35vh;
    overflow-y: auto;
    border: 1px solid #ccc;
    border-radius: 6px;
    display: none;
  }

  .result-item {
    padding: 10px;
    cursor: pointer;
  }

  .result-item:hover,
  .result-item.active {
    background: #e6e6e6;
  }

  .search-wrap {
    position: relative;
  }

  #clearSearch {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    font-size: 22px;
    cursor: pointer;
    display: none;
  }

  /* 1. Eliminate the side padding on mobile to use full screen width */
.esri-view-width-xsmall .esri-popup__main-container,
.esri-view-width-small .esri-popup__main-container {
  width: 98vw !important; /* Leaves only 1% padding on each side */
  max-width: 98vw !important;
  margin: 0 auto !important;
  left: 1vw !important; 
}

.esri-view-width-xsmall .esri-popup__content,
.esri-view-width-small .esri-popup__content {
  padding: 0 !important;
  margin: 0 !important;
}

/* 2. Force the Table to respect percentage widths */
.esri-feature-fields__table {
  width: 100% !important;
  table-layout: fixed !important; /* This is mandatory to force the 30/70 split */
  border-collapse: collapse !important;
  margin: 0 !important;
}

/* 3. Explicitly define the column ratios */
.esri-feature-fields__field-header {
  width: 30% !important;
  min-width: 30% !important;
  max-width: 30% !important;
  padding: 10px 6px !important;
  word-break: break-word !important;
  border-right: 1px solid #e0e0e0 !important; /* Optional: adds a vertical divider */
}

.esri-feature-fields__field-value {
  width: 70% !important;
  min-width: 70% !important;
  max-width: 70% !important;
  padding: 10px 8px !important;
  word-break: break-word !important;
}

/* 4. Desktop wide-view override */
.esri-view-width-greater-than-small .esri-popup__main-container {
  width: 500px !important;
}

/* 5. Font Styles (Normal weight) */
.esri-feature-fields__field-header,
.esri-feature-fields__field-value {
  font-family: Arial, sans-serif !important;
  font-size: 13px !important;
  font-weight: 400 !important;
  color: #333 !important;
}

  /* ───────── Mobile specific (Bottom Controls) ───────── */
  @media (max-width: 768px) {
    #controls {
      width: 94%;
      left: 50% !important; /* Move to center */
      transform: translateX(-50%); /* Offset by half its width to center exactly */
      top: auto;
      bottom: 12px;
      border-radius: 14px;
      margin: 0; /* Remove any default margins */
      box-sizing: border-box;
    }

    /* This handles the collapsed state while keeping it centered */
    #controls.collapsed {
      transform: translate(-50%, calc(100% - 45px)) !important;
    }
  }
</style>

  <!-- SEARCH -->

  <!-- TOGGLES -->

    <div class="section">Layers</div>
    <label><input type="checkbox" id="stateChk" checked> State Boundary</label><br>

  </div>

</div>

<div id="viewDiv"></div>

<script>
  
  const worldLocator =
  "https://geocode-api.arcgis.com/arcgis/rest/services/World/GeocodeServer";

require([
  "esri/Map",

  "esri/config"
], function (
  Map, MapView,
  MapImageLayer, FeatureLayer,
  Graphic, Point, ScaleBar, Locate, locator, esriConfig
) {
  esriConfig.apiKey = "AAPTxy8BH1VEsoebNVZXo8HurKdAwSbr3tap2eaxJY7Eqwza-FGiC6bjE-hhpBRvGJ2wDnbvdmPI7YFWeiNXNv6su9s4lbgk8V_8AF7vUtQTkgI-5EA5YPbRJgTLnU8DP1qJCTztP8XktMd0xQu99qfTENAzYFXEPc1D-dx7joWwLUqLNFt7ApWKCXPbopJ8oAlWK3wspWKMg0OiMyOmtpo6N0u2d3K5vNHQ_uobPl467zg.AT1_oPY0JXcr";


  const results = document.getElementById("results");
  
  const isMobile = window.matchMedia("(max-width: 768px)").matches;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const controls = document.getElementById("controls");
  

  function collapse() { if (isMobile || isIOS) controls.classList.add("collapsed"); }
  function expand() { if (isMobile || isIOS) controls.classList.remove("collapsed"); }

  esriConfig.request.interceptors.push({
    urls: /mapservice\.gov\.in/,
    before: p => {
      p.requestOptions.query = p.requestOptions.query || {};
      const u = p.url;
      if (u.includes("State_Boundary"))
        p.requestOptions.query.token = "B_MvXZQQA3UJQ3rriTr7Qvo4AE-8f2v0JmAgH3h17-3OVcp7agXot9jS8Q7ZPelzaaShzPs5CR7tqOeucn4Oww..";
      else if (u.includes("District_Boundary"))
        p.requestOptions.query.token = "KLafX5W7tKxU3qXCTtWzmiub5IsvSYcYf8OYVbFZaO_5Dlji_67_mzrUu6qCgWJ6djeLy_izw-rxbEWms3Ss0g..";
      else if (u.includes("River"))
        p.requestOptions.query.token = "aprsZsvhLhQlrHeo2O-9F-PWMUmaTr7awaxuyKOXtWOMMp0VVG70sfDnNltnsh3SLOqcK8zLNCvPqBThYxn5tw..";
      else if (u.includes("River Basins"))
        p.requestOptions.query.token = "LYFmEZL-IKy3-iAuFBbGMpNs0rPaWFMD5KuaJUT7I6OFXUWRxnUhDjR3SJfE-ndgh9aAdyua9Cs8b9POB7R51Q..";

  const stateLayer = new MapImageLayer({
    url: "https://mapservice.gov.in/gismapservice/rest/services/BharatMapService/State_Boundary/MapServer",
    visible: true

  const districtLayer = new MapImageLayer({

    visible: false
  });

  const riverLayer = new MapImageLayer({
    url: "https://mapservice.gov.in/gismapservice/rest/services/BharatMapService/River/MapServer",

  });

  /* const riverBasinsLayer = new MapImageLayer({
    url: "https://mapservice.gov.in/gismapservice/rest/services/BharatMapService/Watershed/MapServer",
    visible: false
  }); */
  
  

  // ──────────────────────────────────────────────────────────────
  //  FeatureLayer for Dams (points + labels)
  // ──────────────────────────────────────────────────────────────
  let damFeatureLayer;
  let normalDamLabeling;

  const map = new Map({
    basemap: "satellite",
    layers: [stateLayer, districtLayer, riverLayer]
  });

  const view = new MapView({
    container: "viewDiv",
    map,
    extent: { xmin: 68, ymin: 6, xmax: 97, ymax: 37, spatialReference: { wkid: 4326 } },
    
    popup: isMobile || isIOS
  ? {
      dockEnabled: false
    }
  : {
      dockEnabled: true,
      dockOptions: {
        position: "top-right",
        breakpoint: false
      }
    }


  });

  // locate
const locateWidget = new Locate({
  view: view,
  useHeadingEnabled: false,
  goToOverride: function (view, options) {
    return view.goTo(
      {
        target: options.target.target || options.target,
        scale: 200000
      },
      {
        duration: 2000,   // ✅ SAME speed as dam search
        easing: "ease-in-out"
      }
    );
  }
});

view.ui.add(locateWidget, "top-right");
	

  if (isMobile || isIOS) {
  controls.classList.add("collapsed");

  controls.addEventListener("click", e => {
    e.stopPropagation();
    controls.classList.remove("collapsed");
  });

  view.on("click", () => {
    controls.classList.add("collapsed");
  });

  // Collapse when popup opens OR when user taps a new feature while popup is already open
  view.when(() => {
    view.popup.watch("visible", (isVisible) => {
      if (isVisible) controls.classList.add("collapsed");
    });
    view.popup.watch("location", () => {
      if (view.popup.visible) controls.classList.add("collapsed");
    });
  });

  // Collapse on direct touch of the popup container
  document.addEventListener("touchstart", (e) => {
    const popup = document.querySelector(".esri-popup__main-container");
    if (popup && popup.contains(e.target)) {
      controls.classList.add("collapsed");
    }
  }, { passive: true });
}

  // Feature layer for dams
  const riverBasinsLabeling = [
  {
    labelExpressionInfo: {
   expression: `
    When(
      $feature.BA_NAME == 'West flowing rivers of Kutch and Saurashtra including Luni Basin',
      'West flowing rivers\\n of Kutch and Saurashtra\\n including Luni Basin',

      $feature.BA_NAME == 'West flowing rivers from Tapi to Tadri Basin',
      'West flowing rivers\\nfrom Tapi to Tadri Basin',

      $feature.BA_NAME == 'West flowing rivers from Tadri to Kanyakumari Basin',
      'West flowing rivers\\nfrom Tadri to Kanyakumari Basin',

      $feature.BA_NAME == 'Minor rivers draining into Myanmar and Bangladesh Basin',
      'Minor rivers draining into\\nMyanmar and Bangladesh Basin',

      $feature.BA_NAME == 'East flowing rivers between Pennar and Kanyakumari Basin',
      'East flowing rivers\\nbetween Pennar and Kanyakumari Basin',

      $feature.BA_NAME == 'East flowing rivers between Mahanadi and Pennar Basin',
      'East flowing rivers\\nbetween Mahanadi and Pennar Basin',

      $feature.BA_NAME == 'Area of Inland drainage in Rajasthan Basin',
      'Area of Inland drainage\\nin Rajasthan Basin',

	  $feature.BA_NAME
    )
  `
},
    labelPlacement: "polygon-center",
    minScale: 15000000,   // show from country level
    maxScale: 0,
    symbol: {
      type: "text",
      color: [120, 200, 200, 0.9],
      haloColor: [0, 0, 0, 0.9],
      haloSize: "1.5px",
      font: {
        family: "Arial",
        size: 10,
        weight: "bold"
      }
    }
  }
];


  let riverBasinsLayer;

fetch("river-basins.geojson")
  .then(r => r.json())
  .then(geojson => {

    const features = [];

geojson.features.forEach((f, i) => {
  if (!f.geometry) return;

  if (f.geometry.type === "Polygon") {
    features.push({
      geometry: {
        type: "polygon",
        rings: f.geometry.coordinates,
        spatialReference: { wkid: 4326 }
      },
      attributes: { OBJECTID: i + 1, ...f.properties }
    });
  }

  if (f.geometry.type === "MultiPolygon") {
    f.geometry.coordinates.forEach((poly, j) => {
      features.push({
        geometry: {
          type: "polygon",
          rings: poly,
          spatialReference: { wkid: 4326 }
        },
        attributes: { OBJECTID: i * 1000 + j, ...f.properties }
      });
    });
  }
});


    const fields = Object.keys(features[0].attributes).map(k => ({
      name: k,
      alias: k.replace(/_/g, " "),
      type: k === "OBJECTID" ? "oid" : "string"
    }));

    riverBasinsLayer = new FeatureLayer({
      source: features,
      objectIdField: "OBJECTID",
      geometryType: "polygon",
      spatialReference: { wkid: 4326 },
      fields: fields,
      renderer: {
        type: "simple",
        symbol: {
          type: "simple-fill",
          color: [0, 0, 0, 0],
          outline: {
            color: [120, 200, 200, 0.9],
            width: 1.2
          }
        }
      },
      labelingInfo: riverBasinsLabeling,
	    labelsVisible: true,
	    visible: false,
      title: "River Basins"
    });

    map.add(riverBasinsLayer, 0);

    riverBasinsChk.onchange = () => {
      riverBasinsLayer.visible = riverBasinsChk.checked;
    };
  });

  // feature layer for ho sites
  let hoFeatureLayer;

fetch("ho-sites.geojson")
  .then(r => r.json())
  .then(geojson => {

    const features = geojson.features.map((f, i) => ({
      geometry: new Point({
        longitude: f.geometry.coordinates[0],
        latitude: f.geometry.coordinates[1],
        spatialReference: { wkid: 4326 }
      }),
      attributes: {
        OBJECTID: i + 1,
        ...f.properties
      }
    }));

    if (!features.length) return;

    const fields = Object.keys(features[0].attributes).map(k => ({
      name: k,
      alias: k.replace(/_/g, " "),
      type: k === "OBJECTID" ? "oid" : "string"
    }));

    hoFeatureLayer = new FeatureLayer({
      source: features,
      objectIdField: "OBJECTID",
      geometryType: "point",
      spatialReference: { wkid: 4326 },
      fields: fields,
      renderer: {
        type: "simple",
        symbol: {
          type: "simple-marker",
          color: [220, 20, 60, 0.9],   // crimson red
          size: 4
          // outline: {
          //  color: [255, 255, 255],
          //  width: 1
         // }
        }
      },
      popupTemplate: {
        title: "HO Site",
        content: [
          {
            type: "fields",
            fieldInfos: fields
              .filter(f => f.name !== "OBJECTID")
              .map(f => ({
                fieldName: f.name,
                label: f.alias
              }))
          }
        ]
      },
      visible: false
    });

    map.add(hoFeatureLayer);

    // Checkbox toggle
    hoChk.onchange = () => {
      hoFeatureLayer.visible = hoChk.checked;
    };

  })
  .catch(err => console.error("Failed to load ho-sites.geojson", err));


  const scaleBar = new ScaleBar({
  view: view,
  unit: "metric"
});

view.ui.add(scaleBar, {
  position: "bottom-right"
});


  if (!isMobile && !isIOS) {
  view.on("drag", collapse);
  view.on("mouse-wheel", collapse);
}

   damSearch.addEventListener("focus", expand);

  basemapSelect.onchange = () => {
    map.basemap =
      basemapSelect.value === "none" ? null :
      basemapSelect.value === "satellite" ? "satellite" :
	  basemapSelect.value === "hybrid" ? "hybrid" :
      basemapSelect.value === "streets" ? "streets-vector" :
      "topo-vector";
  };

  stateChk.onchange = () => stateLayer.visible = stateChk.checked;
  districtChk.onchange = () => districtLayer.visible = districtChk.checked;
  riverChk.onchange = () => riverLayer.visible = riverChk.checked;
  riverBasinsChk.onchange = () => riverBasinsLayer.visible = riverBasinsChk.checked;

  damChk.onchange = () => {
    if (damFeatureLayer) damFeatureLayer.visible = damChk.checked;
  };

  

  // ── State / SDSO filter logic (outer scope) ─────────────────────────
  var stateFilterEl = document.getElementById("stateFilter");
  var sdsoFilterEl  = document.getElementById("sdsoFilter");
  var _stateMap = {};   // { stateName: [sdso1, sdso2, ...] }
  var _sdsoList = [];

  function buildFilterIndexes(json) {
    var sm = {};
    var sdsoSet = {};
    json.forEach(function(dam) {
      var st = (dam.State || "").trim();
      var sd = (dam.SDSO  || "").trim();
      if (!st) return;
      if (!sm[st]) sm[st] = {};
      if (sd) { sm[st][sd] = true; sdsoSet[sd] = true; }
    });
    _stateMap = sm;
    _sdsoList = Object.keys(sdsoSet).sort();

    // Populate State dropdown
    Object.keys(sm).sort().forEach(function(s) {
      var opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      stateFilterEl.appendChild(opt);
    });

    // Populate SDSO on load with all SDSOs
    populateSdso("");

    stateFilterEl.onchange = function() {
      // Repopulate SDSO list for selected state, preserve current SDSO if still valid
      var curSdso = sdsoFilterEl.value;
      populateSdso(stateFilterEl.value);
      // Keep SDSO selection if it exists in the new list, else reset
      if (curSdso && sdsoFilterEl.querySelector('option[value="' + curSdso + '"]')) {
        sdsoFilterEl.value = curSdso;
      } else {
        sdsoFilterEl.value = "";
      }
      applyFilters();
    };
    sdsoFilterEl.onchange = function() {
      applyFilters();
    };
  }

  function populateSdso(selectedState) {
    sdsoFilterEl.innerHTML = '<option value="">— All SDSOs —</option>';
    var list = selectedState
      ? Object.keys(_stateMap[selectedState] || {}).sort()
      : _sdsoList;
    list.forEach(function(s) {
      var opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      sdsoFilterEl.appendChild(opt);
    });
  }

  function applyFilters() {
    // Keep search text if agg filter is active
    if (!activeAggFilter) {
      damSearch.value = "";
      document.getElementById("results").style.display = "none";
      document.getElementById("clearSearch").style.display = "none";
      currentMatches = [];
      groupedResults = [];
      activeIndex = -1;
      // Default labeling + zoom for dropdown-only filters
      var where = buildFilterWhere();
      damFeatureLayer.definitionExpression = where || null;
      damFeatureLayer.labelingInfo = normalDamLabeling;
      view.popup.close();
      if (where) {
        damFeatureLayer.queryExtent({ where: where }).then(function(result) {
          if (result.extent) view.goTo(result.extent.expand(1.3), { duration: 1500 });
        });
      }
    } else {
      // Agg filter active → re-query with combined WHERE, forced labeling, popup
      document.getElementById("results").style.display = "none";
      reapplyAggLabeling();
    }
  }

  // Apply an aggregated search filter (persists across dropdown changes)
  function applyAggFilter(field, value, label) {
    activeAggFilter = { field: field, value: value, label: label };
    damSearch.value = label;
    document.getElementById("clearSearch").style.display = "block";
    document.getElementById("results").style.display = "none";
    activeIndex = -1;
    var where = buildFilterWhere();
    damFeatureLayer.definitionExpression = where || null;
    view.popup.close();
    // Query matching features → forced labeling + popup (same as before)
    damFeatureLayer.queryFeatures({
      where: where || "1=1",
      outFields: ["*"],
      returnGeometry: true
    }).then(function(response) {
      var features = response.features;
      if (!features.length) return;
      var objectIds = features.map(function(f) { return f.attributes.OBJECTID; });
      var geometries = features.map(function(f) { return f.geometry; });
      damFeatureLayer.labelingInfo = getForcedLabeling(objectIds);
      view.goTo(geometries, { duration: 2000 }).then(function() {
        view.popup.open({ features: features, location: geometries[0] });
      });
    });
  }

  // Re-apply forced labeling + popup when dropdown changes while agg filter is active
  function reapplyAggLabeling() {
    var where = buildFilterWhere();
    damFeatureLayer.definitionExpression = where || null;
    view.popup.close();
    damFeatureLayer.queryFeatures({
      where: where || "1=1",
      outFields: ["*"],
      returnGeometry: true
    }).then(function(response) {
      var features = response.features;
      if (!features.length) {
        damFeatureLayer.labelingInfo = normalDamLabeling;
        return;
      }
      var objectIds = features.map(function(f) { return f.attributes.OBJECTID; });
      var geometries = features.map(function(f) { return f.geometry; });
      damFeatureLayer.labelingInfo = getForcedLabeling(objectIds);
      view.goTo(geometries, { duration: 1500 }).then(function() {
        view.popup.open({ features: features, location: geometries[0] });
      });
    });
  }

  // Load dams → create FeatureLayer once
  fetch("dams.json")
    .then(r => r.json())
    .then(json => {
      const features = [];

      json.forEach((dam, index) => {
        const lat = parseFloat(dam.Latitude);

  damSearch.addEventListener("keydown", function (e) {

    e.preventDefault();
    activeIndex = (activeIndex + 1) % items.length;
  }
  else if (e.key === "ArrowUp" && items.length) {
    e.preventDefault();
    activeIndex = (activeIndex - 1 + items.length) % items.length;
  }

  // ENTER key logic (HYBRID)
  else if (e.key === "Enter") {
    e.preventDefault();

    // Case 1: Dam selected from dropdown

      selectDam(activeIndex);
      return;

      address: { SingleLine: query },

<script>
// ── PWA: Register Service Worker ─────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => {
        console.log("[PWA] Service worker registered:", reg.scope);

        // If a new SW is waiting, prompt user to refresh
        reg.addEventListener("updatefound", () => {
          const newWorker = reg.installing;
          newWorker.addEventListener("statechange", () => {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              showUpdateBanner();
            }
          });
        });
      })
      .catch(err => console.warn("[PWA] SW registration failed:", err));
  });
}

// ── Update banner ─────────────────────────────────────────────────────────────
function showUpdateBanner() {
  const banner = document.createElement("div");
  banner.style.cssText = `
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:#0d47a1; color:white; padding:10px 20px; border-radius:24px;
    font-size:13px; font-family:Arial,sans-serif; z-index:9999;

  `;
  banner.innerHTML = `
    <span>New version available</span>

      background:white; color:#0d47a1; border:none; border-radius:12px;
      padding:4px 12px; font-weight:bold; cursor:pointer; font-size:12px;
    ">Update</button>
  `;
  document.body.appendChild(banner);
}

// ── iOS install hint (shown once, dismissed on tap) ───────────────────────────
function isIos() {
  return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
}
function isInStandaloneMode() {
  return ("standalone" in window.navigator) && window.navigator.standalone;
}
if (isIos() && !isInStandaloneMode() && !localStorage.getItem("pwa-hint-dismissed")) {
  setTimeout(() => {
